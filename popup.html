<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>倍速播放控制器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">当前标签页</p>
        <h1 id="speed">1×</h1>
      </div>
      <span id="status" class="status">自由调速</span>
    </header>

    <p id="hostname" class="hostname">正在读取页面…</p>

    <section aria-labelledby="quick-title">
      <h2 id="quick-title">设置一次</h2>
      <div id="quick-speeds" class="speed-grid"></div>
      <form id="custom-form">
        <label for="custom-speed">自定义倍速</label>
        <div class="custom-row">
          <input id="custom-speed" type="number" min="0.25" max="16" step="0.01" inputmode="decimal" placeholder="例如 2.75">
          <button type="submit">应用</button>
        </div>
        <p id="error" class="error" aria-live="polite"></p>
      </form>
    </section>

    <section class="lock-section" aria-labelledby="lock-title">
      <div>
        <h2 id="lock-title">网站倍速锁定</h2>
        <p id="lock-help">只有明确锁定后，插件才会持续固定速度。</p>
      </div>
      <button id="lock-button" class="lock-button" type="button">锁定当前速度</button>
    </section>

    <p class="footnote">B 站请直接使用播放器内扩展后的倍速菜单。</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
